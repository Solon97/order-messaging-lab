name: Deploy App

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

permissions:
  contents: read
  id-token: write

# Prevents overlapping Deploy App runs (e.g. two quick pushes to main)
# from applying CDK/ECS changes concurrently.
concurrency:
  group: deploy-app-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: order-service
  IMAGE_TAG_PARAMETER: /order-messaging-lab/order-service/image-tag
  ECR_PUSH_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-order-service-ecr-push
  CDK_DEPLOY_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cdk-deploy

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Architecture lint
        run: npm run lint:arch

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

  push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Architecture lint
        run: npm run lint:arch

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Configure AWS credentials (ECR push role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: image-tag
        run: echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.value }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Write image tag to SSM parameter
        env:
          IMAGE_TAG: ${{ steps.image-tag.outputs.value }}
        run: |
          aws ssm put-parameter \
            --name "$IMAGE_TAG_PARAMETER" \
            --value "$IMAGE_TAG" \
            --type String \
            --overwrite

  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure AWS credentials (CDK deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      # Only the ComputeStack needs to be redeployed to roll out the new
      # image tag — other stacks (network, database, edge, foundation)
      # belong to the infra deploy workflow.
      - name: Deploy ComputeStack
        working-directory: infra
        run: npx cdk deploy ComputeStack --require-approval never

      - name: Resolve migration task network configuration
        id: migration-network
        run: |
          SERVICE_SG=$(aws cloudformation describe-stacks --stack-name ComputeStack \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceSecurityGroupId'].OutputValue" --output text)
          SUBNET=$(aws cloudformation describe-stacks --stack-name NetworkStack \
            --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnetId'].OutputValue" --output text)
          echo "service_sg=$SERVICE_SG" >> "$GITHUB_OUTPUT"
          echo "subnet=$SUBNET" >> "$GITHUB_OUTPUT"

      # TypeORM migrations only apply pending ones, so it's safe to run this
      # on every push rather than gating it to the first deploy.
      - name: Run database migration
        env:
          # Deterministic literal — see the matching `clusterName` in
          # infra/lib/compute-stack.ts.
          CLUSTER: order-service-cluster
          SUBNET: ${{ steps.migration-network.outputs.subnet }}
          SERVICE_SG: ${{ steps.migration-network.outputs.service_sg }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition order-service \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SERVICE_SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"order-service","command":["node_modules/.bin/typeorm","migration:run","-d","dist/order/infrastructure/persistence/typeorm/data-source.js"]}]}' \
            --query 'tasks[0].taskArn' --output text)

          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
