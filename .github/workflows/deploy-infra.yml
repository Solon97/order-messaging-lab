name: Deploy Infra

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '!infra/**/*.md'
      - '!infra/**/*.spec.ts'
      - '!infra/**/*.test.ts'
      - '!infra/**/__tests__/**'
  # Lets bring-up.yml call this workflow directly (e.g. to recreate stacks
  # torn down by destroy-infra.yml) without needing a push to main.
  workflow_call:

permissions:
  contents: read
  id-token: write

# Prevents overlapping Deploy Infra runs (e.g. two quick pushes to main)
# from applying CDK changes concurrently.
concurrency:
  group: cdk-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CDK_DEPLOY_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-cdk-deploy

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure AWS credentials (CDK deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Deploy stacks
        working-directory: infra
        run: npx cdk deploy --all --require-approval never
